<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Railway Pro</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="bg-gradient"></div>
<div class="login-wrap">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div class="icon">🚄</div>
      <h2>Control Panel Access</h2>
      <p>Enter your credentials to manage the system</p>
    </div>
    
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="e.g. admin"/>
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••"/>
    </div>
    
    <button class="btn btn-primary w-full mt-4" id="btn-login" style="justify-content:center;">🔓 Sign In</button>
    
    <div style="margin-top:24px; text-align:center; font-size:12px; color:var(--text-muted);">
      <p>Standard roles: Admin, Manager, User</p>
      <a href="index.html" style="color:var(--accent); text-decoration:none; display:inline-block; margin-top:12px;">← Back to Home</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('btn-login').addEventListener('click', async () => {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if (!u || !p) { showToast('Please enter credentials', 'warning'); return; }

  try {
    const res = await api.post('/auth/login', { username: u, password: p });
    showToast(res.message, 'success');
    setTimeout(() => {
      if (res.user.role === 'Admin' || res.user.role === 'Station Manager') window.location.href = 'admin.html';
      else window.location.href = 'dashboard.html';
    }, 800);
  } catch(e) { showToast(e.message, 'error'); }
});

document.addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('btn-login').click(); });
</script>
</body>
</html>
